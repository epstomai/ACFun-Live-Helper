<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- 底层柔和半透明粉色圆盘背景 -->
  <circle cx="50" cy="50" r="48" fill="rgba(253, 76, 93, 0.08)" />

  <!-- A站经典包子头（左、右对称的大圆） -->
  <circle cx="28" cy="38" r="13.5" fill="#c4bcc1" />
  <circle cx="72" cy="38" r="13.5" fill="#c4bcc1" />

  <!-- 脸部白色底座 -->
  <ellipse cx="50" cy="57" rx="25" ry="23" fill="#ffffff" />

  <!-- 顺滑的脸颊与两侧鬓角发流（利用二阶贝塞尔曲线平滑收尖） -->
  <!-- 左鬓角 -->
  <path d="M22,46 Q16,63 26,73 Q26,62 28,48 Z" fill="#c4bcc1" />
  <!-- 右鬓角 -->
  <path d="M78,46 Q84,63 74,73 Q74,62 72,48 Z" fill="#c4bcc1" />

  <!-- M形经典齐刘海：遮盖额头并与鬓角自然交汇 -->
  <path d="M24,44 Q35,43 42,50 Q44,48 48,44 Q52,43 76,44 Q60,34 40,35 Z" fill="#c4bcc1" />

  <!-- AC娘之魂：元气满满的小呆毛 -->
  <path d="M50,33 Q52,18 64,16 Q55,20 49,30 Z" fill="#c4bcc1" />

  <!-- 经典的红发带 / 蝴蝶结，绑在包子头一侧 -->
  <!-- 左发带 -->
  <path d="M22,45 L15,44 Q14,50 17,51 L21,48 Z" fill="#fd4c5d" />
  <!-- 右发带 -->
  <path d="M78,45 L85,44 Q86,50 83,51 L79,48 Z" fill="#fd4c5d" />

  <!-- 激萌豆豆眼，采用温和的中灰偏灰紫，极具柔和感 -->
  <ellipse cx="40" cy="58" rx="2.5" ry="3.8" fill="#8e868f" />
  <ellipse cx="60" cy="58" rx="2.5" ry="3.8" fill="#8e868f" />
</svg>
