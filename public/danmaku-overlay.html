<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ACFun Danmaku Overlay</title>
    <style>
      :root {
        --font-size: 18px;
        --font-family: "Microsoft YaHei", "Noto Sans SC", sans-serif;
        --name-font-family: var(--font-family);
        --name-font-weight: 800;
        --content-font-family: var(--font-family);
        --content-font-weight: 700;
        --text-color: #ffffff;
        --name-color: #fd4c5d;
        --bubble-color: rgba(36, 27, 32, 0.78);
        --rounded: 18px;
        --gap: 10px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
        font-family: var(--font-family);
      }

      #feed {
        position: fixed;
        right: 0;
        bottom: 0;
        left: 0;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        gap: var(--gap);
        width: 100%;
        height: 100%;
        padding: 14px;
        pointer-events: none;
      }

      .item {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        align-items: center;
        gap: 10px;
        width: max-content;
        min-width: min(220px, 100%);
        max-width: 100%;
        padding: 9px 12px;
        color: var(--text-color);
        background: var(--bubble-color);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: var(--rounded);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
        font-size: var(--font-size);
        line-height: 1.35;
        overflow: hidden;
        flex: 0 0 auto;
        animation-duration: 460ms;
        animation-fill-mode: both;
      }

      .item.plain {
        padding: 0;
        background: transparent;
        border-color: transparent;
        box-shadow: none;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.85), 0 0 2px rgba(0, 0, 0, 0.95);
      }

      /* 系统状态提示弹幕：与普通弹幕同形，附左侧状态色条便于和真实弹幕区分 */
      .item.status {
        opacity: 0.92;
        border-left: 3px solid var(--status-accent, #36b37e);
      }

      .item.status .name {
        color: var(--status-accent, #36b37e);
      }

      .item.status[data-tone="warn"] {
        --status-accent: #f59e0b;
      }

      .item.status[data-tone="error"] {
        --status-accent: #ef4444;
      }

      .item.status[data-tone="info"] {
        --status-accent: #38bdf8;
      }

      .item.status.fading {
        animation: fade-out 600ms ease forwards;
      }

      @keyframes fade-out {
        from { opacity: 0.92; }
        to { opacity: 0; transform: translateX(20px); }
      }

      .avatar {
        width: calc(var(--font-size) * 2.15);
        height: calc(var(--font-size) * 2.15);
        overflow: hidden;
        background: #fd4c5d;
        border: 2px solid rgba(255, 255, 255, 0.72);
        border-radius: 50%;
      }

      .avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .avatar span {
        display: grid;
        place-items: center;
        width: 100%;
        height: 100%;
        color: #ffffff;
        font-weight: 800;
      }

      .body {
        min-width: 0;
      }

      .name {
        display: block;
        margin-bottom: 2px;
        color: var(--name-color);
        font-family: var(--name-font-family);
        font-size: 0.82em;
        font-weight: var(--name-font-weight);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .content {
        overflow-wrap: anywhere;
        font-family: var(--content-font-family);
        font-weight: var(--content-font-weight);
      }

      .gift {
        color: #ffd6dc;
      }

      .slide {
        animation-name: slide-in;
      }

      .float {
        animation-name: float-in;
      }

      .pop {
        animation-name: pop-in;
      }

      .fade {
        animation-name: fade-in;
      }

      @keyframes slide-in {
        from {
          opacity: 0;
          transform: translateX(40px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes float-in {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes pop-in {
        0% {
          opacity: 0;
          transform: scale(0.88);
        }
        70% {
          opacity: 1;
          transform: scale(1.04);
        }
        100% {
          transform: scale(1);
        }
      }

      @keyframes fade-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="feed"></div>
    <script>
      const BackendTypes = Object.freeze({
        HEARTBEAT: 1,
        SET_TOKEN: 6,
        GET_DANMU: 100,
      })

      const DanmuTypes = Object.freeze({
        COMMENT: 1000,
        LIKE: 1001,
        ENTER_ROOM: 1002,
        FOLLOW_AUTHOR: 1003,
        THROW_BANANA: 1004,
        GIFT: 1005,
        RICH_TEXT: 1006,
        JOIN_CLUB: 1007,
        SHARE_LIVE: 1008,
        RECENT_COMMENT: 2004,
        DISPLAY_INFO: 2002,
      })

      const PLACEHOLDER_DANMU = { nickname: "AC娘", content: "等待主播开播中…" }

      const STATUS_AUTO_HIDE_MS = 6000
      const RECONNECT_DELAY_MS = 30000
      const HEARTBEAT_INTERVAL_MS = 5000

      const params = new URLSearchParams(window.location.search)
      const feed = document.querySelector("#feed")
      const state = {
        backendUrl: params.get("backendUrl") || "ws://127.0.0.1:15368/",
        liverUID: Number(params.get("liverUID") || 0),
        tokenInfo: decodeBase64Json(params.get("token")),
        style: {
          maxItems: 18,
          fontSize: 18,
          fontFamily: "Microsoft YaHei, Noto Sans SC, sans-serif",
          nameFontFamily: "",
          contentFontFamily: "",
          textColor: "#ffffff",
          nameColor: "#fd4c5d",
          bubbleColor: "rgba(36, 27, 32, 0.78)",
          bubbleEnabled: true,
          showAvatar: true,
          animation: "slide",
          rounded: 18,
          gap: 10,
          scale: 1,
          convertChinese: "none",
          ...decodeBase64Json(params.get("style")),
        },
        requestSeed: 0,
        pending: new Map(),
        socket: null,
        placeholderShown: false,
        heartbeatTimer: null,
        reconnectTimer: null,
        statusFadeTimer: null,
      }

      applyStyle()
      ensureChineseConverter()
      connect()
      subscribeStyleEvents()

      function decodeBase64Json(value) {
        if (!value) {
          return {}
        }
        try {
          const normalized = value.replace(/-/g, "+").replace(/_/g, "/")
          const padded = normalized.padEnd(Math.ceil(normalized.length / 4) * 4, "=")
          const binary = atob(padded)
          const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0))
          return JSON.parse(new TextDecoder().decode(bytes))
        } catch {
          return {}
        }
      }

      // 通过同源 SSE 接收主程序推送的样式更新，实现修改字号 / 字体 / 颜色等实时反映到 OBS 浏览器源。
      // overlay HTML 由主程序的 overlay HTTP server 提供，所以 /events 与本页面同源。
      function subscribeStyleEvents() {
        if (typeof EventSource === "undefined") return
        try {
          const url = new URL("/events", window.location.href)
          const source = new EventSource(url.toString())
          source.addEventListener("style", (event) => {
            applyStylePatch(event.data)
          })
          source.onerror = () => {
            // 内置自动重连，不需要主动处理。
          }
        } catch (_) {}
      }

      function applyStylePatch(raw) {
        let patch
        try {
          patch = JSON.parse(raw)
        } catch (_) {
          return
        }
        if (!patch || typeof patch !== "object") return
        const previousConvert = state.style.convertChinese
        Object.assign(state.style, patch)
        applyStyle()
        if (state.style.convertChinese !== previousConvert) {
          ensureChineseConverter()
        }
      }

      function applyStyle() {
        const nameFont = parseFontVariant(state.style.nameFontFamily || state.style.fontFamily, 800)
        const contentFont = parseFontVariant(state.style.contentFontFamily || state.style.fontFamily, 700)
        document.documentElement.style.setProperty("--font-size", `${state.style.fontSize}px`)
        document.documentElement.style.setProperty("--font-family", state.style.fontFamily)
        document.documentElement.style.setProperty("--name-font-family", nameFont.family)
        document.documentElement.style.setProperty("--name-font-weight", nameFont.weight)
        document.documentElement.style.setProperty("--content-font-family", contentFont.family)
        document.documentElement.style.setProperty("--content-font-weight", contentFont.weight)
        document.documentElement.style.setProperty("--text-color", state.style.textColor)
        document.documentElement.style.setProperty("--name-color", state.style.nameColor)
        document.documentElement.style.setProperty("--bubble-color", state.style.bubbleColor)
        document.documentElement.style.setProperty("--rounded", `${state.style.rounded}px`)
        document.documentElement.style.setProperty("--gap", `${state.style.gap}px`)
        // 整体缩放：用 CSS zoom 同比放大所有视觉元素，OBS 浏览器源宽高保持不变。
        const scale = Number(state.style.scale)
        document.documentElement.style.zoom = Number.isFinite(scale) && scale > 0 ? scale : 1
      }

      let chineseConverter = (text) => text

      async function ensureChineseConverter() {
        const mode = state.style.convertChinese
        if (!mode || mode === "none") {
          chineseConverter = (text) => text
          return
        }
        try {
          if (!window.OpenCC) {
            await new Promise((resolve, reject) => {
              const script = document.createElement("script")
              script.src = "https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"
              script.onload = resolve
              script.onerror = reject
              document.head.appendChild(script)
            })
          }
          const opts = mode === "s2t" ? { from: "cn", to: "twp" } : { from: "twp", to: "cn" }
          chineseConverter = window.OpenCC.Converter(opts)
        } catch (_) {
          chineseConverter = (text) => text
        }
      }

      function convertChineseText(text) {
        const value = String(text || "")
        if (!value) {
          return ""
        }
        try {
          return chineseConverter(value)
        } catch (_) {
          return value
        }
      }

      function parseFontVariant(font, defaultWeight) {
        const value = String(font || "").trim()
        const weights = [
          ["ExtraLight", 200],
          ["UltraLight", 200],
          ["DemiLight", 300],
          ["SemiLight", 300],
          ["Light", 300],
          ["Regular", 400],
          ["Normal", 400],
          ["Medium", 500],
          ["DemiBold", 600],
          ["SemiBold", 600],
          ["Bold", 700],
          ["ExtraBold", 800],
          ["UltraBold", 800],
          ["Heavy", 900],
          ["Black", 900],
          ["EL", 200],
          ["L", 300],
          ["N", 400],
          ["M", 500],
          ["H", 900],
          ["Italic", 400],
          ["特细", 200],
          ["纤细", 200],
          ["细体", 300],
          ["细", 300],
          ["常规", 400],
          ["标准", 400],
          ["中等", 500],
          ["中黑", 500],
          ["半粗", 600],
          ["半黑", 600],
          ["粗体", 700],
          ["粗", 700],
          ["特粗", 800],
          ["特黑", 800],
          ["重", 900],
          ["重黑", 900],
        ]
        for (const [suffix, weight] of weights) {
          const pattern = new RegExp(`\\s+${escapeRegex(suffix)}(?:\\s+Italic)?$`, "i")
          if (pattern.test(value)) {
            const family = splitFontNames(value).map((name) => name.replace(pattern, "").trim() || name).join(" & ")
            return {
              family: fontFamilyCandidates(family, value),
              weight,
            }
          }
        }
        return {
          family: fontFamilyCandidates(value),
          weight: defaultWeight,
        }
      }

      function quoteFontFamily(font) {
        const value = String(font || "").trim()
        if (/^(serif|sans-serif|monospace|cursive|fantasy|system-ui)$/i.test(value)) return value
        return `"${value.replace(/\\/g, "\\\\").replace(/"/g, "\\\"")}"`
      }

      function fontFamilyCandidates(...fonts) {
        const candidates = []
        for (const font of fonts) {
          for (const name of splitFontNames(font)) {
            candidates.push(name)
            if (/思源宋体|思源宋體|Source Han Serif/i.test(name)) {
              candidates.push("思源宋体", "思源宋體", "Source Han Serif", "Source Han Serif K", "Source Han Serif SC", "Noto Serif CJK SC", "Noto Serif SC", "serif")
            } else if (/思源等宽|思源等寬|Source Han Mono|Noto Sans Mono CJK|Noto Sans Mono/i.test(name)) {
              candidates.push("思源等宽", "思源等寬", "Source Han Mono", "Source Han Mono K", "Source Han Mono SC", "Noto Sans Mono CJK SC", "Noto Sans Mono SC", "monospace")
            } else if (/思源黑体|思源黑體|Source Han Sans/i.test(name)) {
              candidates.push("思源黑体", "思源黑體", "Source Han Sans", "Source Han Sans K", "Source Han Sans SC", "Noto Sans CJK SC", "Noto Sans SC", "sans-serif")
            }
          }
        }
        return Array.from(new Set(candidates)).map(quoteFontFamily).join(", ")
      }

      function splitFontNames(font) {
        return String(font || "").split(/\s*&\s*/).map((name) => name.trim()).filter(Boolean)
      }

      function escapeRegex(value) {
        return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&")
      }

      function connect() {
        if (!state.liverUID) {
          showPlaceholder()
          showStatus("未提供主播 UID，请检查浏览器源 URL 中的 liverUID 参数", { tone: "error" })
          return
        }

        closeSocket()
        clearReconnect()

        showStatus(`正在连接 ${state.backendUrl} …`, { tone: "info" })

        state.socket = new WebSocket(state.backendUrl)
        state.socket.onopen = async () => {
          try {
            if (state.tokenInfo && state.tokenInfo.userID) {
              await request(BackendTypes.SET_TOKEN, state.tokenInfo)
            }
            showStatus("已连接 acfunlive-backend，订阅弹幕中…", { tone: "info" })
            await request(BackendTypes.GET_DANMU, { liverUID: state.liverUID })
            clearPlaceholder()
            showStatus(`已连接 · 订阅 UID ${state.liverUID} · 等待弹幕`, { tone: "success", autoHide: true })
            startHeartbeat()
          } catch (error) {
            const message = error && error.message ? error.message : String(error)
            const isNotLive = /未开播|已关播|380023|129004/.test(message)
            showStatus(
              isNotLive ? "已连接 · 主播当前未开播，等待开播中…" : `订阅失败：${message}`,
              { tone: isNotLive ? "warn" : "error" },
            )
            scheduleReconnect()
            try { state.socket && state.socket.close() } catch (_) {}
          }
        }
        state.socket.onmessage = (event) => handleMessage(event)
        state.socket.onclose = () => {
          stopHeartbeat()
          showPlaceholder()
          showStatus(`弹幕监听已断开，${Math.round(RECONNECT_DELAY_MS / 1000)}s 后重连`, { tone: "warn" })
          scheduleReconnect()
        }
        state.socket.onerror = () => {
          showPlaceholder()
          showStatus("连接 acfunlive-backend 出错，将自动重试", { tone: "error" })
        }
      }

      function closeSocket() {
        if (!state.socket) return
        state.socket.onopen = null
        state.socket.onmessage = null
        state.socket.onclose = null
        state.socket.onerror = null
        try { state.socket.close() } catch (_) {}
        state.socket = null
      }

      function clearReconnect() {
        if (state.reconnectTimer) {
          window.clearTimeout(state.reconnectTimer)
          state.reconnectTimer = null
        }
      }

      function scheduleReconnect() {
        if (state.reconnectTimer) return
        state.reconnectTimer = window.setTimeout(() => {
          state.reconnectTimer = null
          connect()
        }, RECONNECT_DELAY_MS)
      }

      function startHeartbeat() {
        stopHeartbeat()
        state.heartbeatTimer = window.setInterval(() => {
          if (state.socket && state.socket.readyState === WebSocket.OPEN) {
            state.socket.send(JSON.stringify({ type: BackendTypes.HEARTBEAT }))
          }
        }, HEARTBEAT_INTERVAL_MS)
      }

      function stopHeartbeat() {
        if (state.heartbeatTimer) {
          window.clearInterval(state.heartbeatTimer)
          state.heartbeatTimer = null
        }
      }

      function showPlaceholder() {
        if (state.placeholderShown) return
        state.placeholderShown = true
        renderDanmu({
          nickname: PLACEHOLDER_DANMU.nickname,
          content: PLACEHOLDER_DANMU.content,
          avatar: "",
          isGift: false,
        })
        const last = feed.lastElementChild
        if (last) last.classList.add("placeholder")
      }

      function clearPlaceholder() {
        state.placeholderShown = false
        feed.querySelectorAll(".placeholder").forEach((node) => node.remove())
      }

      // 渲染或更新状态弹幕。tone: success / info / warn / error。
      // autoHide=true 表示成功类提示自动 6 秒淡出；持久态（如断开）保持。
      function showStatus(text, { tone = "success", autoHide = false } = {}) {
        if (state.statusFadeTimer) {
          window.clearTimeout(state.statusFadeTimer)
          state.statusFadeTimer = null
        }
        clearStatus()
        renderDanmu({
          nickname: "弹幕监听",
          content: String(text || ""),
          avatar: "",
          isGift: false,
        })
        const node = feed.lastElementChild
        if (node) {
          node.classList.add("status")
          node.dataset.tone = tone
        }
        if (autoHide && node) {
          state.statusFadeTimer = window.setTimeout(() => {
            state.statusFadeTimer = null
            if (node.isConnected) {
              node.classList.add("fading")
              window.setTimeout(() => {
                if (node.isConnected) node.remove()
              }, 600)
            }
          }, STATUS_AUTO_HIDE_MS)
        }
      }

      function clearStatus() {
        if (state.statusFadeTimer) {
          window.clearTimeout(state.statusFadeTimer)
          state.statusFadeTimer = null
        }
        feed.querySelectorAll(".status").forEach((node) => node.remove())
      }

      function request(type, data) {
        const requestID = `${Date.now()}-${++state.requestSeed}`
        return new Promise((resolve, reject) => {
          const timer = window.setTimeout(() => {
            state.pending.delete(requestID)
            reject(new Error(`请求 ${type} 超时`))
          }, 12000)
          state.pending.set(requestID, { resolve, reject, timer })
          state.socket.send(JSON.stringify({ type, requestID, data }))
        })
      }

      function handleMessage(event) {
        let message
        try {
          message = JSON.parse(event.data)
        } catch {
          return
        }

        if (message.requestID && state.pending.has(message.requestID)) {
          const pending = state.pending.get(message.requestID)
          window.clearTimeout(pending.timer)
          state.pending.delete(message.requestID)
          if (message.result === 1) {
            pending.resolve(message.data)
          } else {
            pending.reject(new Error(message.error || "后端请求失败"))
          }
          return
        }

        if (message.liverUID !== undefined && message.type !== undefined) {
          const items = mapDanmuMessage(message)
          if (items.length) {
            clearStatus()
            clearPlaceholder()
          }
          items.forEach(renderDanmu)
        }
      }

      function mapDanmuMessage(message) {
        const data = message.data || {}
        if (message.type === DanmuTypes.RECENT_COMMENT && Array.isArray(data)) {
          return data.map((item) => makeItem(item.danmuInfo && item.danmuInfo.userInfo, item.content, item.danmuInfo && item.danmuInfo.sendTime))
        }
        if (message.type === DanmuTypes.COMMENT) {
          return [makeItem(data.danmuInfo && data.danmuInfo.userInfo, data.content, data.danmuInfo && data.danmuInfo.sendTime)]
        }
        if (message.type === DanmuTypes.GIFT) {
          const gift = data.giftDetail || {}
          const count = Number(data.count || 1) * Number(data.combo || 1)
          return [makeItem(getUserInfo(data), `${gift.giftName || "礼物"} x${count}`, data.danmuInfo && data.danmuInfo.sendTime, true)]
        }
        if (message.type === DanmuTypes.THROW_BANANA) {
          return [makeItem(getUserInfo(data), `香蕉 x${data.bananaCount || 1}`, data.danmuInfo && data.danmuInfo.sendTime, true)]
        }
        if (message.type === DanmuTypes.ENTER_ROOM) {
          return [makeItem(data.userInfo, "进入直播间", data.sendTime)]
        }
        if (message.type === DanmuTypes.FOLLOW_AUTHOR) {
          return [makeItem(data.userInfo, "关注了主播", data.sendTime)]
        }
        if (message.type === DanmuTypes.JOIN_CLUB) {
          return [makeItem(data.fansInfo, "加入守护团", data.joinTime)]
        }
        if (message.type === DanmuTypes.RICH_TEXT) {
          return [makeItem(getRichTextUser(data), richTextContent(data), data.sendTime)]
        }
        return []
      }

      function getUserInfo(data) {
        return data.userInfo || (data.danmuInfo && data.danmuInfo.userInfo) || data.fansInfo || {}
      }

      function getRichTextUser(data) {
        const segment = (data.segments || []).find((item) => item.segment && item.segment.userInfo)
        return segment ? segment.segment.userInfo : {}
      }

      function richTextContent(data) {
        return (data.segments || []).map((item) => {
          const segment = item.segment || {}
          if (segment.userInfo) {
            return segment.userInfo.nickname || ""
          }
          if (segment.text) {
            return segment.text
          }
          if (segment.alternativeText) {
            return segment.alternativeText
          }
          if (Array.isArray(segment.pictures) && segment.pictures.length) {
            return "[图片]"
          }
          return ""
        }).join("")
      }

      function makeItem(userInfo = {}, content = "", time = Date.now(), isGift = false) {
        return {
          nickname: userInfo.nickname || userInfo.name || "匿名用户",
          avatar: userInfo.avatar || "",
          content: content || "",
          time,
          isGift,
        }
      }

      function renderDanmu(item) {
        if (!item.content) {
          return
        }

        const article = document.createElement("article")
        article.className = `item ${state.style.animation || "slide"}`
        if (!state.style.bubbleEnabled) {
          article.classList.add("plain")
        }

        if (state.style.showAvatar) {
          const avatar = document.createElement("div")
          avatar.className = "avatar"
          if (item.avatar) {
            const img = document.createElement("img")
            img.src = item.avatar
            avatar.appendChild(img)
          } else {
            const fallback = document.createElement("span")
            fallback.textContent = String(item.nickname || "A").slice(0, 1).toUpperCase()
            avatar.appendChild(fallback)
          }
          article.appendChild(avatar)
        }

        const body = document.createElement("div")
        body.className = "body"
        const name = document.createElement("strong")
        name.className = "name"
        name.textContent = convertChineseText(item.nickname)
        const content = document.createElement("div")
        content.className = item.isGift ? "content gift" : "content"
        content.textContent = convertChineseText(item.content)
        body.append(name, content)
        article.appendChild(body)
        feed.appendChild(article)

        while (feed.children.length > Number(state.style.maxItems || 18)) {
          feed.firstElementChild.remove()
        }
      }
    </script>
  </body>
</html>
